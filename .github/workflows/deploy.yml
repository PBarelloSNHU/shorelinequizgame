name: Deploy to GitHub Pages

on:
  # Runs on every push to the main branch
  push:
    branches: [main]

  # Allows manual triggering from the Actions tab
  workflow_dispatch:

# Grant the GITHUB_TOKEN the permissions required to deploy to Pages
permissions:
  contents: read
  pages: write
  id-token: write



# Allow only one concurrent deployment, skipping runs queued between the
# in-progress run and latest queued. Do not cancel in-progress runs as we
# want to allow production deployments to complete.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Vite's default build output directory
          path: ./dist
      
      -name: Set cache dependency path 
      uses: actions/checkout@v4
      uses: actions/setup-node@v4 with:
          node-version: 24
      run: npm install
      working-directory: host-client
      run: npm run build
      working-directory: host-client

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
